<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Fotos Jacky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/design-system.css">
  <link rel="stylesheet" href="/src/css/store.css">
</head>
<body class="store-theme">

  <!-- ===== HEADER TIENDA ===== -->
  <header class="store-header">
    <a href="index.html" class="logo">FOTOS JACKY.</a>
    <div style="display:flex; align-items:center;">
      <nav class="store-nav">
        <a href="index.html">Tienda</a>
      </nav>
    </div>
  </header>

  <main class="page-top-spacing">
    <div class="container">
      <div class="glass-panel">
      <div class="checkout-layout">
        
        <div class="checkout-form">
          <form id="checkoutForm">
            <!-- Contacto -->
            <div class="form-section">
              <h2>1. Datos de Contacto</h2>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Email *</label>
                  <input type="email" name="email" required>
                </div>
                <div class="form-group">
                  <label>Nombre *</label>
                  <input type="text" name="firstName" required>
                </div>
                <div class="form-group">
                  <label>Apellido *</label>
                  <input type="text" name="lastName" required>
                </div>
                <div class="form-group">
                  <label>Teléfono *</label>
                  <input type="tel" name="phone" required>
                </div>
                <div class="form-group">
                  <label>DNI *</label>
                  <input type="text" name="dni" required>
                </div>
              </div>
            </div>

            <!-- Envío -->
            <div class="form-section">
              <h2>2. Datos de Envío</h2>
              <div class="form-grid">
                <div class="form-group">
                  <label>Calle *</label>
                  <input type="text" name="street" required>
                </div>
                <div class="form-group">
                  <label>Número *</label>
                  <input type="text" name="streetNumber" required>
                </div>
                <div class="form-group">
                  <label>Piso / Depto</label>
                  <input type="text" name="apartment">
                </div>
                <div class="form-group">
                  <label>Código Postal *</label>
                  <input type="text" name="zipCode" required>
                </div>
                <div class="form-group">
                  <label>Ciudad *</label>
                  <input type="text" name="city" required>
                </div>
                <div class="form-group">
                  <label>Provincia *</label>
                  <select name="province" required>
                    <option value="">Seleccionar...</option>
                    <option value="CABA">Capital Federal</option>
                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Santa Fe">Santa Fe</option>
                  </select>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem;">Continuar a Pago</button>
          </form>
        </div>

        <div class="order-summary" id="checkoutSummary">
          <h2 style="margin-bottom: 24px;">Resumen del Pedido</h2>
          <div id="checkoutItems"></div>
          <div class="summary-total">
            <span>Total</span>
            <span id="checkoutTotal">$0</span>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script type="module" src="/src/js/pages/checkout.js"></script>
</body>
</html>
