<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar compra | Fotos Jacky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/design-system.css">
  <link rel="stylesheet" href="/src/css/store.css">
</head>
<body class="store-theme">

  <!-- ===== HEADER ===== -->
  <header class="store-header">
    <a href="index.html" class="logo">FOTOS <span>JACKY.</span></a>
    <nav class="store-nav">
      <a href="index.html">Tienda</a>
      <a href="carrito.html">Carrito</a>
    </nav>
  </header>

  <main class="page-top-spacing">
    <div class="container">
      <div class="page-head">
        <span class="page-eyebrow">Último paso</span>
        <h1>Finalizar compra</h1>
      </div>

      <div class="checkout-layout">
        <!-- FORM -->
        <div class="checkout-form-panel">
          <form id="checkoutForm">

            <!-- 1. Contacto -->
            <div class="form-section">
              <div class="form-section-head">
                <span class="form-step-num">1</span>
                <h2>Tus datos</h2>
              </div>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Email *</label>
                  <input type="email" name="email" required placeholder="tucorreo@email.com">
                </div>
                <div class="form-group">
                  <label>Nombre *</label>
                  <input type="text" name="firstName" required>
                </div>
                <div class="form-group">
                  <label>Apellido *</label>
                  <input type="text" name="lastName" required>
                </div>
                <div class="form-group">
                  <label>Teléfono *</label>
                  <input type="tel" name="phone" required placeholder="341 555 1234">
                </div>
                <div class="form-group">
                  <label>DNI *</label>
                  <input type="text" name="dni" required>
                </div>
              </div>
            </div>

            <!-- 2. Método de entrega -->
            <div class="form-section">
              <div class="form-section-head">
                <span class="form-step-num">2</span>
                <h2>¿Cómo lo recibís?</h2>
              </div>

              <div class="delivery-options">
                <label class="delivery-card selected" data-method="retiro_local">
                  <input type="radio" name="shippingMethod" value="retiro_local" checked>
                  <span class="dc-title">Retiro en el local</span>
                  <span class="dc-desc">Juan José Paso 5537, Rosario</span>
                  <span class="dc-price">Gratis</span>
                </label>

                <label class="delivery-card" data-method="envio_domicilio">
                  <input type="radio" name="shippingMethod" value="envio_domicilio">
                  <span class="dc-title">Envío a domicilio</span>
                  <span class="dc-desc">Lo enviamos a tu dirección</span>
                  <span class="dc-price">A coordinar</span>
                </label>
              </div>

              <!-- Info de retiro (visible por defecto) -->
              <div class="pickup-info" id="pickupInfo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <div>
                  <div class="pi-title">Retirás en nuestro local</div>
                  <div class="pi-text">Juan José Paso 5537, Rosario, Santa Fe. Te avisamos por email cuando tu pedido esté listo para retirar.</div>
                </div>
              </div>

              <!-- Datos de envío (ocultos por defecto) -->
              <div class="address-section hidden" id="addressSection">
                <div class="form-grid">
                  <div class="form-group">
                    <label>Calle</label>
                    <input type="text" name="street" data-addr>
                  </div>
                  <div class="form-group">
                    <label>Número</label>
                    <input type="text" name="streetNumber" data-addr>
                  </div>
                  <div class="form-group">
                    <label>Piso / Depto</label>
                    <input type="text" name="apartment">
                  </div>
                  <div class="form-group">
                    <label>Código Postal</label>
                    <input type="text" name="zipCode" data-addr>
                  </div>
                  <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" name="city" data-addr>
                  </div>
                  <div class="form-group">
                    <label>Provincia</label>
                    <select name="province" data-addr>
                      <option value="">Seleccionar...</option>
                      <option value="Santa Fe">Santa Fe</option>
                      <option value="Buenos Aires">Buenos Aires</option>
                      <option value="CABA">Capital Federal</option>
                      <option value="Córdoba">Córdoba</option>
                      <option value="Entre Ríos">Entre Ríos</option>
                      <option value="Mendoza">Mendoza</option>
                      <option value="Otra">Otra</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-cta" id="submitBtn">Ir a pagar →</button>
            <div class="secure-note">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              Pago protegido con Mercado Pago
            </div>
          </form>
        </div>

        <!-- RESUMEN -->
        <aside class="order-summary">
          <div class="summary-title">Tu pedido</div>
          <div class="order-summary-items" id="checkoutItems"></div>
          <div class="summary-row" style="margin-top:16px">
            <span>Subtotal</span>
            <span id="checkoutSubtotal">$0</span>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <span id="checkoutShipping">Gratis</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span class="amount" id="checkoutTotal">$0</span>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module" src="/src/js/pages/checkout.js"></script>
</body>
</html>
